services:
  sports-predictor:
    build: .
    container_name: sports-predictor
    restart: unless-stopped
    ports:
      - "8501:8501"
    volumes:
      - ./data/cache/nhl:/app/data/cache/nhl
      - ./data/cache/mlb:/app/data/cache/mlb
      - ./data/cache/nba:/app/data/cache/nba
      - ./data/cache/model:/app/data/cache/model
      - ./logs:/app/logs
    environment:
      - TZ=America/New_York
      - WARM_ON_START=false
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
