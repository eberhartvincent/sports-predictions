# docker-compose.yml — run on your HOME MACHINE
#
# Before first run, set your GitHub username:
#   export GITHUB_USER=your_github_username
#   docker-compose pull
#   docker-compose up -d
#
# Or hardcode it: replace ${GITHUB_USER} with your actual username below.

services:

  # ── Main app ────────────────────────────────────────────────────────────────
  sports-predictor:
    image: ghcr.io/${GITHUB_USER}/sports-predictor:latest
    container_name: sports-predictor
    restart: unless-stopped
    ports:
      - "8501:8501"
    volumes:
      # Cache volumes — data inside the image is the baseline.
      # Anything written at runtime is persisted here on the host.
      - sports_cache_nhl:/app/data/cache/nhl
      - sports_cache_mlb:/app/data/cache/mlb
      - sports_cache_nba:/app/data/cache/nba
      - sports_cache_model:/app/data/cache/model
      - sports_logs:/app/logs
    environment:
      - TZ=America/New_York
      - WARM_ON_START=false    # caches are baked into the image — no need to warm on start
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Watchtower — auto-updates the app when GitHub pushes a new image ────────
  # Checks ghcr.io every 5 minutes. When it sees a new :latest it pulls the
  # image, gracefully stops the old container, and starts the new one.
  # Zero manual work required on your end.
  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Provide Docker credentials so Watchtower can pull from ghcr.io
      - ${HOME}/.docker/config.json:/config.json:ro
    command: >
      --interval 300
      --cleanup
      --label-enable
      sports-predictor
    environment:
      - TZ=America/New_York

# ── Named volumes (persist data between image updates) ───────────────────────
volumes:
  sports_cache_nhl:
  sports_cache_mlb:
  sports_cache_nba:
  sports_cache_model:
  sports_logs:
