name: Daily Cache Warm

on:
  schedule:
    - cron: "0 15 * * *"
  workflow_dispatch:
    inputs:
      sport:
        description: "Sport to warm (all / mlb / nhl / nba)"
        required: false
        default: "all"

jobs:
  warm-cache:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore API and model caches (not committed to git)
        uses: actions/cache@v4
        with:
          path: |
            data/cache/nhl/
            data/cache/mlb/
            data/cache/nba/
            data/cache/model/
          key: sport-caches-${{ github.run_id }}
          restore-keys: sport-caches-

      - name: Warm caches and save predictions
        run: |
          SPORT="${{ github.event.inputs.sport || 'all' }}"
          DATE=$(TZ="America/New_York" date +%Y-%m-%d)
          echo "Warming: sport=$SPORT  date=$DATE"
          python scripts/warm_cache.py --sport "$SPORT" --date "$DATE"
          echo "--- Prediction files ---"
          ls -lh data/cache/predictions/ 2>/dev/null || echo "No predictions dir"

      - name: Save API and model caches for next run
        uses: actions/cache@v4
        with:
          path: |
            data/cache/nhl/
            data/cache/mlb/
            data/cache/nba/
            data/cache/model/
          key: sport-caches-${{ github.run_id }}


      - name: Send predictions email
        if: success()
        env:
          EMAIL_SENDER:     ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:   ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
        run: |
          python scripts/send_predictions_email.py
      - name: Commit only prediction files to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage the freshly generated prediction files FIRST
          # before fetching, so git checkout can't overwrite them
          mkdir -p data/cache/predictions/history

          git add -f data/cache/predictions/*.parquet 2>/dev/null || true
          git add -f data/cache/predictions/*.json    2>/dev/null || true
          git add -f data/cache/predictions/history/*.parquet 2>/dev/null || true

          # If nothing changed there's nothing to do
          if git diff --staged --quiet; then
            echo "No prediction changes to commit"
            exit 0
          fi

          echo "Files to commit:"
          git diff --staged --name-only

          # Pull any code changes that happened during the run (rebase our
          # prediction-file commit on top, keeping our staged changes intact)
          git stash -u  # stash everything including untracked
          git fetch origin main
          git rebase origin/main || git rebase --abort
          git stash pop 2>/dev/null || true

          # Re-stage after stash pop (stash pop may unstage)
          git add -f data/cache/predictions/*.parquet 2>/dev/null || true
          git add -f data/cache/predictions/*.json    2>/dev/null || true
          git add -f data/cache/predictions/history/*.parquet 2>/dev/null || true

          DATE=$(TZ="America/New_York" date +%Y-%m-%d)
          git commit -m "chore: predictions ${DATE} [skip ci]"
          git push origin main
